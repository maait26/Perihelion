<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Perihelion">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080B14">
<title>Perihelion</title>
<style>
  :root{
    --space:#080B14;
    --ink:#EDEDF4;
    --dim:#6B7387;
    --gold:#F0B24A;
    --violet:#8E7BFF;
    --beacon:#5FE8C8;
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
    --sans:"Avenir Next",Avenir,Futura,"Segoe UI",system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--space)}
  body{font-family:var(--mono);color:var(--ink);-webkit-user-select:none;user-select:none;touch-action:none}
  canvas{position:fixed;inset:0;display:block;cursor:crosshair}

  #hud{position:fixed;inset:0;pointer-events:none;display:flex;justify-content:space-between;
       align-items:flex-start;font-size:12px;letter-spacing:.08em;
       padding:calc(18px + env(safe-area-inset-top)) calc(22px + env(safe-area-inset-right))
               18px calc(22px + env(safe-area-inset-left))}
  #hud.hidden{display:none}
  .hcol{display:flex;flex-direction:column;gap:4px}
  .hcol.right{align-items:flex-end}
  #lvlTag{color:var(--dim)}
  #lvlName{font-family:var(--sans);font-size:15px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
  #lvlHint{color:var(--dim);margin-top:2px;font-size:11px}
  #scoreLine{font-variant-numeric:tabular-nums}
  #scoreLine b{color:var(--beacon);font-weight:600}
  .keys{color:var(--dim);font-size:11px;display:flex;gap:10px}
  .keys button{pointer-events:auto;background:none;border:1px solid #2A3145;color:var(--dim);
    font:inherit;letter-spacing:inherit;padding:3px 9px;border-radius:3px;cursor:pointer}
  .keys button:hover{color:var(--ink);border-color:var(--dim)}
  .keys button:focus-visible{outline:2px solid var(--beacon);outline-offset:2px}

  #card{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(8,11,20,0);transition:background .5s;pointer-events:none}
  #card.on{background:rgba(8,11,20,.72);pointer-events:auto;cursor:pointer}
  #card.on.stay{cursor:default}
  #cardBox{text-align:center;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;
    max-width:min(560px,90vw)}
  #card.on #cardBox{opacity:1;transform:none}
  #cardKick{color:var(--dim);font-size:12px;letter-spacing:.28em;text-transform:uppercase}
  #cardTitle{font-family:var(--sans);font-size:clamp(28px,6vw,52px);font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;margin:10px 0 14px}
  #cardBody{font-size:13px;line-height:1.9;color:var(--ink)}
  #cardBody .good{color:var(--beacon)} #cardBody .meh{color:var(--gold)}
  #cardBody .dim{color:var(--dim)}
  #cardGo{margin-top:26px;font-size:11px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase}
  .menuBtns{display:flex;flex-direction:column;gap:14px;margin-top:8px;align-items:center}
  .menuBtns button{background:none;border:1px solid #2A3145;color:var(--ink);font-family:var(--mono);
    font-size:13px;letter-spacing:.14em;padding:13px 22px;border-radius:3px;cursor:pointer;
    width:min(400px,80vw);text-transform:uppercase}
  .menuBtns button small{display:block;color:var(--dim);font-size:11px;letter-spacing:.08em;
    margin-top:5px;text-transform:none}
  .menuBtns button:hover{border-color:var(--beacon)}
  .menuBtns button:hover small{color:var(--ink)}
  .menuBtns button:focus-visible{outline:2px solid var(--beacon);outline-offset:2px}
  @media (prefers-reduced-motion: reduce){
    #card,#cardBox{transition:none}
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" class="hidden">
  <div class="hcol">
    <div id="lvlTag"></div>
    <div id="lvlName"></div>
    <div id="lvlHint"></div>
  </div>
  <div class="hcol right">
    <div id="scoreLine">LAUNCHES <b id="strokes">0</b> · PAR <span id="par">1</span></div>
    <div class="keys">
      <button id="btnReset" title="Restart sector (R)">R · RESTART</button>
      <button id="btnMute" title="Sound (M)">M · SOUND ON</button>
      <button id="btnMenu" title="Abandon run, return to title (Q)">Q · MENU</button>
      <button id="btnFull" title="Fullscreen (F)">F · FULL</button>
    </div>
  </div>
</div>

<div id="card">
  <div id="cardBox">
    <div id="cardKick"></div>
    <div id="cardTitle"></div>
    <div id="cardBody"></div>
    <div id="cardGo"></div>
  </div>
</div>

   axis of aim), and DEEP SPACE generates endless sectors,

function launchVector(){
  const lv = level();
  let dx = lv.pad.x - aimX, dy = lv.pad.y - aimY;

  const pow = Math.min(mag, MAX_PULL) / MAX_PULL;
  if (mag === 0) return { vx:0, vy:0, mag:0 };
  return { vx: dx/mag * pow * MAX_V, vy: dy/mag * pow * MAX_V, mag };
}

/* ---------- physics (time-aware) ---------- */
function bodyPos(b, t){
  if (!b.orbit) return b;
  const o = b.orbit, a = o.w * t + o.ph;
  return { x: o.cx + Math.cos(a) * o.rad, y: o.cy + Math.sin(a) * o.rad };
}

function targetArmed(lv){
  return !lv.relays || lv.relays.every(r => r.hit);
}

function accel(lv, x, y, t){
  let ax = 0, ay = 0;
  for (const b of lv.bodies){
    if (!b.s) continue;                              // debris: mass without pull
    const q = bodyPos(b, t);
    const dx = q.x - x, dy = q.y - y;
    const d  = Math.hypot(dx, dy);
    const dd = Math.max(d, b.r * 0.9);
    const f  = b.pulse ? Math.sin(b.pulse.w * t + b.pulse.ph) : b.t;
    const a  = (b.s / (dd * dd)) * f;
    ax += a * dx / d;
    ay += a * dy / d;
  }
  return { ax, ay };
}

/* advance one substep at absolute sector-time t; "fly"|"crash"|"lost"|"won" */
function integrate(lv, p, dt, t){
  const { ax, ay } = accel(lv, p.x, p.y, t);
  p.vx += ax * dt;  p.vy += ay * dt;
  p.x  += p.vx * dt; p.y += p.vy * dt;
  const t2 = t + dt;
  if (lv.holes) for (const hh of lv.holes){
    const dA = Math.hypot(hh.ax - p.x, hh.ay - p.y);
    const dB = Math.hypot(hh.bx - p.x, hh.by - p.y);
    if (dA < hh.r || dB < hh.r){
      const ex = dA < hh.r ? hh.bx : hh.ax, ey = dA < hh.r ? hh.by : hh.ay;
      const sp = Math.hypot(p.vx, p.vy) || 1;
      p.x = ex + p.vx / sp * (hh.r + PROBE_R + 6);   // step clear of the exit ring
      p.y = ey + p.vy / sp * (hh.r + PROBE_R + 6);
      p.warped = true;
      break;
    }
  }
  for (const b of lv.bodies){
    const q = bodyPos(b, t2);
    if (Math.hypot(q.x - p.x, q.y - p.y) < b.r + PROBE_R) return "crash";
  }
  const tg = lv.target;
  if (targetArmed(lv) && Math.hypot(tg.x - p.x, tg.y - p.y) < tg.r + PROBE_R) return "won";
  if (p.x < -MARGIN || p.x > W + MARGIN || p.y < -MARGIN || p.y > H + MARGIN) return "lost";
  return "fly";
}

function stepFlight(dt){
  const lv = level();
  const SUB = 6, h = dt / SUB;
  for (let i = 0; i < SUB; i++){
    const out = integrate(lv, probe, h, levelClock + h * i);
    if (lv.relays) for (const r of lv.relays){
      if (!r.hit && Math.hypot(r.x - probe.x, r.y - probe.y) < r.r + PROBE_R){
        r.hit = true; sfxRelay();
      }
    }
    if (probe.warped){ probe.warped = false; trail.push({ x: probe.x, y: probe.y, br: true }); sfxWarp(); }
    if (out === "fly") continue;
    if (out === "won"){ levelWon(); return; }
    shotFailed(out); return;
  }
  flightT += dt;
  if (flightT > MAX_FLIGHT){ shotFailed("lost"); return; }
  const last = trail[trail.length - 1];
  if (!last || Math.hypot(probe.x - last.x, probe.y - last.y) > 3)
    trail.push({ x: probe.x, y: probe.y });
  if (trail.length > 900) trail.shift();
}

function shotFailed(kind){
  ghosts.push(trail);
  if (ghosts.length > GHOST_MAX) ghosts.shift();
  if (kind === "crash"){ burst(probe.x, probe.y); flash = 1; sfxCrash(); }
  else sfxLost();
  spawnProbe();
  phase = "aim";
}

function spawnProbe(){
  const lv = level();
  probe = { x: lv.pad.x, y: lv.pad.y, vx: 0, vy: 0 };
  trail = [];
  padPulse = 1;
}

/* short look-ahead from *now* — moons keep moving, so the dots breathe */
function previewPath(){
  const lv = level();
  const v = launchVector();
  if (v.mag < 12) return { pts: [], end: null };
  const p = { x: lv.pad.x, y: lv.pad.y, vx: v.vx, vy: v.vy };
  const N = previewSteps();
  if (!N) return { pts: [], end: null };
  const pts = [];
  let end = null;
  const h = 1 / 75;
  for (let i = 0; i < N; i++){
    const out = integrate(lv, p, h, levelClock + i * h);
    pts.push({ x: p.x, y: p.y });
    if (out !== "fly"){ end = out; break; }
  }
  return { pts, end };
}

/* ---------- particles ---------- */
function burst(x, y){
  for (let i = 0; i < 26; i++){
    const a = Math.random() * Math.PI * 2, sp = 40 + Math.random() * 220;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
                     life: .5 + Math.random() * .5 });
  }
}
function burstWin(x, y){
  for (let i = 0; i < 30; i++){
    const a = (i / 30) * Math.PI * 2, sp = 60 + Math.random() * 120;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
                     life: .6 + Math.random() * .5, win: true });
  }
}
function stepParticles(dt){
  for (const q of particles){
    q.x += q.vx * dt; q.y += q.vy * dt;
    q.vx *= .985; q.vy *= .985; q.life -= dt;
  }
  particles = particles.filter(q => q.life > 0);
}

/* ============================================================
   DEEP SPACE — endless generated sectors.
   Each candidate is brute-force flown across a grid of angles,
   powers and launch moments. Too few solutions: unfair, reject.
   Too many: dull, reject. Par is read off the solution density.
   The dev tool that fixed this game now plays it before you do.
   ============================================================ */
const GREEK = ["ALPHA","BETA","GAMMA","DELTA","EPSILON","ZETA","ETA","THETA",
               "IOTA","KAPPA","LAMBDA","SIGMA","TAU","OMEGA"];

function rnd(a, b){ return a + Math.random() * (b - a); }
function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

function candidateSector(d){
  const padY = rnd(150, 490);
  const spread = Math.min(180, 30 + d * 30);       // shallow lanes run straighter
  const tgtY = Math.min(500, Math.max(140, padY + rnd(-spread, spread)));
  const lv = {
    name: pick(GREEK) + "-" + Math.floor(rnd(10, 99)),
    hint: "", par: 3,
    pad: { x: rnd(115, 160), y: padY },
    target: { x: rnd(835, 895), y: tgtY, r: 15 },
    bodies: []
  };
  const n = Math.min(2 + Math.floor((d - 1) / 2), 5);
  const k = Math.min(1, 0.55 + d * 0.08);          // shallow depths pull their punches
  const placed = [];
  for (let i = 0; i < n; i++){
    const rep = Math.random() < 0.35;
    let b = null;
    for (let tries = 0; tries < 40 && !b; tries++){
      const c = rep
        ? { x: rnd(260,760), y: rnd(95,545), r: rnd(18,26), s: rnd(2.5e6,5.5e6)*k, t:-1 }
        : { x: rnd(260,760), y: rnd(95,545), r: rnd(22,40), s: rnd(6e6,1.3e7)*k,  t: 1 };
      if (Math.hypot(c.x-lv.pad.x,   c.y-lv.pad.y)   < c.r + 120) continue;
      if (Math.hypot(c.x-lv.target.x,c.y-lv.target.y)< c.r + 110) continue;
      if (placed.some(p => Math.hypot(c.x-p.x, c.y-p.y) < c.r + p.r + 60)) continue;
      b = c;
    }
    if (b){ placed.push(b); lv.bodies.push(b); }
  }
  /* from depth 4: sometimes hang a moon off one of the suns */
  if (d >= 4 && Math.random() < 0.45){
    const suns = placed.filter(p => p.t === 1);
    if (suns.length){
      const host = pick(suns);
      lv.bodies.push({
        r: rnd(11, 15), s: rnd(1.8e6, 3.2e6), t: Math.random() < 0.6 ? 1 : -1,
        orbit: { cx: host.x, cy: host.y, rad: host.r + rnd(55, 130),
                 w: (Math.random() < 0.5 ? -1 : 1) * rnd(0.55, 1.15),
                 ph: rnd(0, 6.283) }
      });
    }
  }
  return lv;
}

/* Cooperative survey: flies the test grid in ~12ms slices so the UI
   never freezes, even for deep sectors with moons. */
function makeSurvey(lv){
  const hasMoon = lv.bodies.some(b => b.orbit);
  const phases = hasMoon ? [0, 1.6, 3.2] : [0];
  const ANG = 64, POW = 8, h = 1 / 200, maxSteps = 200 * 7;
  const total = phases.length * ANG * POW;
  let idx = 0, hits = 0, minT = Infinity;
  return {
    get done(){ return idx >= total; },
    get density(){ return hits / phases.length; },
    get minT(){ return minT; },                    // fastest winning flight, seconds
    get progress(){ return idx / total; },
    step(msBudget){
      const t0 = performance.now();
      while (idx < total && performance.now() - t0 < msBudget){
        const ph = phases[Math.floor(idx / (ANG * POW))];
        const ai = Math.floor(idx / POW) % ANG;
        const pi = idx % POW + 1;
        const ang = ai / ANG * Math.PI * 2;
        const p = { x: lv.pad.x, y: lv.pad.y,
                    vx: Math.cos(ang) * (pi / POW) * MAX_V,
                    vy: Math.sin(ang) * (pi / POW) * MAX_V };
        for (let i = 0; i < maxSteps; i++){
          const out = integrate(lv, p, h, ph + i * h);
          if (out === "fly") continue;
          if (out === "won"){ hits++; minT = Math.min(minT, i * h); }
          break;
        }
        idx++;
      }
    }
  };
}

function generateSector(d, done){
  const token = ++genToken;
  let attempt = 0, survey = null, lv = null;
  const tick = () => {
    if (token !== genToken) return;               // player left; stop quietly
    if (!survey){
      attempt++;
      lv = candidateSector(d);
      survey = makeSurvey(lv);
    }
    survey.step(12);
    const el = document.getElementById("scanProg");
    if (el) el.textContent = "attempt " + attempt + " · " +
      Math.round(survey.progress * 100) + "% flown";
    if (!survey.done){ setTimeout(tick, 0); return; }

    const dens = survey.density, minT = survey.minT;
    /* A sector is "easy" if a quick, preview-visible solution exists (short
       flight) OR solutions are plentiful. Density alone misgrades straight
       lanes: one narrow beam is low-density but trivial to aim. */
    const ok = d <= 2 ? (minT <= 1.8 || dens >= 12)
             : d <= 5 ? (minT <= 2.6 || dens >= 5)
             : dens >= 3 || minT <= 4;
    const freebie = d >= 6 && minT <= 1.2;         // deep space earns its name
    if ((ok && !freebie) || (attempt >= 14 && dens >= 1)){
      lv.par = ((minT <= 1.6 && dens >= 4) || dens >= 24) ? 2
             : (minT <= 3.2 || dens >= 7) ? 3 : 4;
      lv.hint = "estimated par " + lv.par + " · verified winnable";
      done(lv);
      return;
    }
    survey = null;                                  // reject; chart another sector
    setTimeout(tick, 0);
  };
  setTimeout(tick, 0);
}

    const d = strokes - lv.par;

               : d === 0 ? '<span class="good">ON PAR</span>'
               : '<span class="meh">+' + d + ' OVER PAR</span>';
    cKick.textContent  = "BEACON REACHED" +
      (mode === "campaign" ? " · +" + "\u2605".repeat(DIFFS[diffIdx].stars) : "");

    cBody.innerHTML    = strokes + (strokes === 1 ? " LAUNCH · " : " LAUNCHES · ") + call;
    cGo.textContent    = mode === "endless" ? "click to descend"
                       : levelIdx + 1 < levelList().length ? "click for the next sector" : "click for mission report";
  } else { // report — campaign end or endless abandon
    const tot = results.reduce((a, b) => a + b, 0);
    const parTot = mode === "endless" ? parSoFar : mode === "puzzle" ? PUZZLE_PAR : CAMPAIGN_PAR;
    const cleared = results.length;
    const d = tot - parTot;
    const grade = d <= -3 ? "GRAVITY BENDS FOR YOU"
                : d <= 0  ? "A STEADY HAND IN DEEP SPACE"
                : d <= 6  ? "SCUFFED, SINGED, HOME"
                : "THE GHOSTS TAUGHT YOU EVERYTHING";
    cKick.textContent  = "MISSION REPORT";
    cTitle.textContent = "Perihelion";
    cBody.innerHTML    = (mode === "endless"
        ? "DEPTH REACHED · " + cleared
        : "ALL " + levelList().length + " BEACONS REACHED" +
          (mode === "campaign"
            ? "<br>" + DIFFS[diffIdx].name + " · " + "\u2605".repeat(DIFFS[diffIdx].stars) + " \u00d7 " +
              cleared + ' = <span class="good">' + cleared * DIFFS[diffIdx].stars + " STARS</span>"
            : "")) +
      "<br>" + tot + " LAUNCHES · PAR " + parTot + " · " +
      (d > 0 ? '<span class="meh">+' + d + "</span>"
             : '<span class="good">' + (d === 0 ? "EVEN" : d) + "</span>") +
      (cleared ? "<br><br>" + grade : "");
    cGo.textContent    = "click for the title screen";
  }
  cardEl.classList.add("on");
}

function advanceCard(){
  if (!cardOn || cardKind === "menu" || cardKind === "scan") return;
  if (cardKind === "difficulty"){ showCard("menu"); return; }
  cardOn = false;
  cardEl.classList.remove("on");
  if (cardKind === "intro"){ phase = "aim"; }
  else if (cardKind === "won"){
    if (mode === "endless"){ nextEndless(); }
    else if (levelIdx + 1 < levelList().length){ levelIdx++; startLevel(); }
    else showCard("report");
  } else { toMenu(); }
}

function toMenu(){
  genToken++;                 // cancel any generation in flight
  mode = "campaign"; phase = "menu";
  probe = null; ghosts = []; trail = []; particles = [];
  hudEl.classList.add("hidden");
  cardOn = true; showCard("menu");
}

function startCampaign(){
  mode = "campaign"; levelIdx = 0; results = [];
  hudEl.classList.remove("hidden");
  cardOn = false; cardEl.classList.remove("on");
  startLevel();
}

function startPuzzles(){
  mode = "puzzle"; levelIdx = 0; results = [];
  hudEl.classList.remove("hidden");
  cardOn = false; cardEl.classList.remove("on");
  startLevel();
}

function startEndless(){
  mode = "endless"; depth = 0; results = []; parSoFar = 0;
  hudEl.classList.remove("hidden");
  cardOn = false; cardEl.classList.remove("on");
  nextEndless();
}

function nextEndless(){
  depth++;
  phase = "scan";
  genLevel = null; probe = null; ghosts = [];
  showCard("scan");
  generateSector(depth, lv => {
    genLevel = lv;
    startLevel();
  });
}

function startLevel(){
  strokes = 0; ghosts = []; particles = []; flash = 0;
  levelClock = 0; flightT = 0;
  if (level().relays) level().relays.forEach(r => r.hit = false);
  spawnProbe(); updateHUD();
  phase = "card"; showCard("intro");
}

function levelWon(){
  results.push(strokes);
  if (mode === "endless") parSoFar += level().par;
  burstWin(level().target.x, level().target.y);
  sfxWin();
  phase = "done";
  setTimeout(() => showCard("won"), 550);
}

function restartLevel(){
  if (phase !== "aim" && phase !== "fly") return;
  strokes = 0; ghosts = []; particles = []; flash = 0;
  levelClock = 0; flightT = 0;
  if (level().relays) level().relays.forEach(r => r.hit = false);
  spawnProbe(); updateHUD();
  phase = "aim";
}

function abandonRun(){
  if (phase === "menu" || phase === "scan") return;
  if (mode === "endless" && results.length) showCard("report");
  else toMenu();
}

function updateHUD(){
  document.getElementById("lvlTag").textContent = mode === "endless"
    ? "DEEP SPACE · DEPTH " + String(depth).padStart(2, "0")
    : mode === "puzzle"
    ? "PUZZLE " + String(levelIdx + 1).padStart(2, "0") + "/" + String(PUZZLES.length).padStart(2, "0")
    : "SECTOR " + String(levelIdx + 1).padStart(2, "0") + "/" + String(LEVELS.length).padStart(2, "0")
      + " · " + "\u2605".repeat(DIFFS[diffIdx].stars);
  document.getElementById("lvlName").textContent = level().name;
  document.getElementById("lvlHint").textContent = level().hint;
  document.getElementById("strokes").textContent = strokes;
  document.getElementById("par").textContent = level().par;
}

/* ---------- sound ---------- */
let AC = null;
function audioInit(){
  if (AC || muted) return;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
}
function tone(freq, dur, type, gain, slideTo){
  if (!AC || muted) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, AC.currentTime + dur);
  g.gain.setValueAtTime(gain, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001, AC.currentTime + dur);
  o.connect(g).connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur);
}
function sfxLaunch(p){ tone(220 + 420 * p, .25, "sine", .12, 90); }
function sfxCrash(){ tone(160, .3, "sawtooth", .10, 40); }
function sfxLost(){ tone(300, .35, "sine", .07, 120); }
function sfxRelay(){ tone(660, .14, "sine", .11, 990); }
function sfxWarp(){ tone(420, .2, "sine", .09, 1200); }
function sfxWin(){ tone(523, .16, "sine", .12); setTimeout(() => tone(784, .3, "sine", .12), 130); }
function toggleMute(){
  muted = !muted;
  document.getElementById("btnMute").textContent = muted ? "M · SOUND OFF" : "M · SOUND ON";
  if (!muted) audioInit();
}

/* ---------- rendering ---------- */
function draw(){
  cx.fillStyle = "#080B14";
  cx.fillRect(0, 0, innerWidth, innerHeight);

  cx.save();
  cx.translate(offX, offY);
  cx.scale(scale, scale);

  for (const s of stars){
    const tw = reduceMotion ? .7 : .45 + .45 * Math.sin(clock * s.sp + s.p);
    cx.globalAlpha = .25 + .5 * tw;
    cx.fillStyle = "#C9D2E8";
    cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, 7); cx.fill();
  }
  cx.globalAlpha = 1;

  const lv = level();
  if (lv && phase !== "menu" && phase !== "scan"){
    cx.lineWidth = 1.4;
    cx.strokeStyle = "rgba(180,190,215,0.10)";
    for (const g of ghosts){
      if (g.length < 2) continue;
      cx.beginPath(); cx.moveTo(g[0].x, g[0].y);
      for (let i = 1; i < g.length; i++)
        g[i].br ? cx.moveTo(g[i].x, g[i].y) : cx.lineTo(g[i].x, g[i].y);
      cx.stroke();
    }

    if (lv.holes) for (const hh of lv.holes) drawHole(hh);
    for (const b of lv.bodies) drawBody(b);
    if (lv.relays) for (const r of lv.relays) drawRelay(r);
    drawBeacon(lv.target, targetArmed(lv));
    drawPad(lv.pad);

    if (trail.length > 1){
      cx.lineWidth = 2;
      const grad = cx.createLinearGradient(trail[0].x, trail[0].y, probe.x, probe.y);
      grad.addColorStop(0, "rgba(237,237,244,0)");
      grad.addColorStop(1, "rgba(237,237,244,0.75)");
      cx.strokeStyle = grad;
      cx.beginPath(); cx.moveTo(trail[0].x, trail[0].y);
      for (let i = 1; i < trail.length; i++)
        trail[i].br ? cx.moveTo(trail[i].x, trail[i].y) : cx.lineTo(trail[i].x, trail[i].y);
      cx.lineTo(probe.x, probe.y);
      cx.stroke();
    }

    if (phase === "aim" && aiming) drawAim();

    if (probe && (phase === "aim" || phase === "fly")){
      const glow = 1 + padPulse * 2.2;
      cx.fillStyle = "rgba(237,237,244,0.16)";
      cx.beginPath(); cx.arc(probe.x, probe.y, PROBE_R * 2.4 * glow, 0, 7); cx.fill();
      cx.fillStyle = "#EDEDF4";
      cx.beginPath(); cx.arc(probe.x, probe.y, PROBE_R, 0, 7); cx.fill();
    }

    for (const q of particles){
      cx.globalAlpha = Math.max(q.life, 0);
      cx.fillStyle = q.win ? "#5FE8C8" : "#F0B24A";
      cx.beginPath(); cx.arc(q.x, q.y, 2.2, 0, 7); cx.fill();
    }
    cx.globalAlpha = 1;
  }

  cx.restore();

  if (flash > 0){
    cx.fillStyle = "rgba(240,178,74," + (flash * 0.08) + ")";
    cx.fillRect(0, 0, innerWidth, innerHeight);
  }
}

function drawHole(hh){
  cx.strokeStyle = "rgba(142,123,255,0.10)";
  cx.lineWidth = 1;
  cx.setLineDash([2, 9]);
  cx.beginPath(); cx.moveTo(hh.ax, hh.ay); cx.lineTo(hh.bx, hh.by); cx.stroke();
  cx.setLineDash([]);
  const spin = reduceMotion ? 0 : clock;
  for (const [ex, ey] of [[hh.ax, hh.ay], [hh.bx, hh.by]]){
    cx.fillStyle = "#0B0F1E";
    cx.beginPath(); cx.arc(ex, ey, hh.r, 0, 7); cx.fill();
    cx.lineWidth = 2;
    cx.strokeStyle = "#8E7BFF";
    cx.setLineDash([9, 7]); cx.lineDashOffset = -spin * 22;
    cx.beginPath(); cx.arc(ex, ey, hh.r, 0, 7); cx.stroke();
    cx.strokeStyle = "#5FE8C8";
    cx.lineDashOffset = spin * 22;
    cx.beginPath(); cx.arc(ex, ey, hh.r - 5, 0, 7); cx.stroke();
    cx.setLineDash([]); cx.lineDashOffset = 0;
  }
}

function drawRelay(r){
  const p = reduceMotion ? .5 : (clock % 1.2) / 1.2;
  if (r.hit){
    cx.fillStyle = "rgba(95,232,200,0.16)";
    cx.beginPath(); cx.arc(r.x, r.y, r.r, 0, 7); cx.fill();
    cx.strokeStyle = "rgba(95,232,200,0.9)";
    cx.lineWidth = 2;
    cx.beginPath(); cx.arc(r.x, r.y, r.r, 0, 7); cx.stroke();
    cx.beginPath(); cx.moveTo(r.x - 6, r.y); cx.lineTo(r.x - 1.5, r.y + 5); cx.lineTo(r.x + 7, r.y - 5);
    cx.stroke();
  } else {
    cx.strokeStyle = "rgba(95,232,200," + (0.35 + 0.35 * (1 - p)) + ")";
    cx.lineWidth = 1.6;
    cx.setLineDash([5, 6]); cx.lineDashOffset = reduceMotion ? 0 : -clock * 14;
    cx.beginPath(); cx.arc(r.x, r.y, r.r, 0, 7); cx.stroke();
    cx.setLineDash([]); cx.lineDashOffset = 0;
  }
}

function drawBody(b){
  const pos = bodyPos(b, levelClock);
  if (b.orbit){                       // telegraph the track
    cx.strokeStyle = "rgba(200,205,230,0.10)";
    cx.lineWidth = 1;
    cx.setLineDash([3, 7]);
    cx.beginPath(); cx.arc(b.orbit.cx, b.orbit.cy, b.orbit.rad, 0, 7); cx.stroke();
    cx.setLineDash([]);
  }
  if (b.rock){
    cx.fillStyle = "#232A3C";
    cx.beginPath(); cx.arc(pos.x, pos.y, b.r, 0, 7); cx.fill();
    cx.strokeStyle = "rgba(150,160,185,0.5)";
    cx.lineWidth = 1.5;
    cx.beginPath(); cx.arc(pos.x, pos.y, b.r, 0, 7); cx.stroke();
    cx.strokeStyle = "rgba(150,160,185,0.28)";
    cx.beginPath(); cx.arc(pos.x - b.r*.32, pos.y - b.r*.2, b.r*.24, 0, 7); cx.stroke();
    cx.beginPath(); cx.arc(pos.x + b.r*.28, pos.y + b.r*.3, b.r*.16, 0, 7); cx.stroke();
    return;
  }
  if (b.pulse){
    const f = Math.sin(b.pulse.w * levelClock + b.pulse.ph);
    const pullA = Math.max(f, 0), pushA = Math.max(-f, 0);
    if (pullA > .02){
      const g = cx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, b.r * 3);
      g.addColorStop(0, "rgba(240,178,74," + (0.3 * pullA) + ")");
      g.addColorStop(1, "rgba(240,178,74,0)");
      cx.fillStyle = g;
      cx.beginPath(); cx.arc(pos.x, pos.y, b.r * 3, 0, 7); cx.fill();
    }
    if (pushA > .02){
      const g = cx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, b.r * 3);
      g.addColorStop(0, "rgba(142,123,255," + (0.28 * pushA) + ")");
      g.addColorStop(1, "rgba(142,123,255,0)");
      cx.fillStyle = g;
      cx.beginPath(); cx.arc(pos.x, pos.y, b.r * 3, 0, 7); cx.fill();
    }
    const c = cx.createRadialGradient(pos.x - b.r*.3, pos.y - b.r*.3, b.r*.1, pos.x, pos.y, b.r);
    c.addColorStop(0, "#E8E0D0"); c.addColorStop(1, "#6B6478");
    cx.fillStyle = c;
    cx.beginPath(); cx.arc(pos.x, pos.y, b.r * (1 + 0.06 * f), 0, 7); cx.fill();
    cx.lineWidth = 2.5;
    cx.strokeStyle = f >= 0
      ? "rgba(240,178,74," + (0.25 + 0.75 * pullA) + ")"
      : "rgba(142,123,255," + (0.25 + 0.75 * pushA) + ")";
    cx.beginPath(); cx.arc(pos.x, pos.y, b.r * (1 + 0.06 * f) + 3, 0, 7); cx.stroke();
    return;
  }
  const pulse = reduceMotion ? 0 : Math.sin(clock * 2 + pos.x) * .04;
  if (b.t === 1){
    const g = cx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, b.r * 3.2);
    g.addColorStop(0, "rgba(240,178,74,0.28)");
    g.addColorStop(1, "rgba(240,178,74,0)");
    cx.fillStyle = g;
    cx.beginPath(); cx.arc(pos.x, pos.y, b.r * 3.2, 0, 7); cx.fill();

    const c = cx.createRadialGradient(pos.x - b.r*.3, pos.y - b.r*.3, b.r*.1, pos.x, pos.y, b.r);
    c.addColorStop(0, "#FFDFA3"); c.addColorStop(1, "#B87A1E");
    cx.fillStyle = c;
    cx.beginPath(); cx.arc(pos.x, pos.y, b.r * (1 + pulse), 0, 7); cx.fill();
  } else {
    const g = cx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, b.r * 2.6);
    g.addColorStop(0, "rgba(142,123,255,0.22)");
    g.addColorStop(1, "rgba(142,123,255,0)");
    cx.fillStyle = g;
    cx.beginPath(); cx.arc(pos.x, pos.y, b.r * 2.6, 0, 7); cx.fill();

    cx.fillStyle = "#141227";
    cx.beginPath(); cx.arc(pos.x, pos.y, b.r, 0, 7); cx.fill();
    cx.lineWidth = 2.5; cx.strokeStyle = "#8E7BFF";
    cx.beginPath(); cx.arc(pos.x, pos.y, b.r * (1 + pulse), 0, 7); cx.stroke();

    cx.lineWidth = 1.6;
    const spin = reduceMotion ? 0 : clock * .5;
    for (let i = 0; i < 8; i++){
      const a = spin + i * Math.PI / 4;
      cx.beginPath();
      cx.moveTo(pos.x + Math.cos(a) * (b.r + 5), pos.y + Math.sin(a) * (b.r + 5));
      cx.lineTo(pos.x + Math.cos(a) * (b.r + 13), pos.y + Math.sin(a) * (b.r + 13));
      cx.stroke();
    }
  }
}

function drawBeacon(t, armed){
  if (!armed){
    cx.strokeStyle = "rgba(107,115,135,0.55)";
    cx.lineWidth = 1.6;
    cx.setLineDash([4, 6]);
    cx.beginPath(); cx.arc(t.x, t.y, t.r, 0, 7); cx.stroke();
    cx.setLineDash([]);
    cx.fillStyle = "rgba(107,115,135,0.25)";
    cx.beginPath(); cx.arc(t.x, t.y, t.r * .5, 0, 7); cx.fill();
    return;
  }
  const p = reduceMotion ? .5 : (clock % 1.6) / 1.6;
  cx.strokeStyle = "rgba(95,232,200," + (0.55 * (1 - p)) + ")";
  cx.lineWidth = 1.6;
  cx.beginPath(); cx.arc(t.x, t.y, t.r + 4 + p * 22, 0, 7); cx.stroke();

  cx.strokeStyle = "rgba(95,232,200,0.8)";
  cx.beginPath(); cx.arc(t.x, t.y, t.r, 0, 7); cx.stroke();

  const g = cx.createRadialGradient(t.x, t.y, 0, t.x, t.y, t.r);
  g.addColorStop(0, "#BFFFEF"); g.addColorStop(1, "rgba(95,232,200,0.15)");
  cx.fillStyle = g;
  cx.beginPath(); cx.arc(t.x, t.y, t.r * .62, 0, 7); cx.fill();
}

function drawPad(p){
  cx.strokeStyle = "rgba(107,115,135,0.7)";
  cx.lineWidth = 1.4;
  cx.beginPath();
  for (let i = 0; i < 6; i++){
    const a = Math.PI / 6 + i * Math.PI / 3;
    const x = p.x + Math.cos(a) * 15, y = p.y + Math.sin(a) * 15;
    i ? cx.lineTo(x, y) : cx.moveTo(x, y);
  }
  cx.closePath(); cx.stroke();
}

function drawAim(){
  const lv = level();
  const v = launchVector();
  if (v.mag < 12) return;

  const pow = Math.min(v.mag, MAX_PULL) / MAX_PULL;
  cx.lineWidth = 1.4;
  cx.strokeStyle = "rgba(237,237,244,0.45)";
  cx.setLineDash([4, 5]);
  cx.beginPath(); cx.moveTo(aimX, aimY); cx.lineTo(lv.pad.x, lv.pad.y); cx.stroke();
  cx.setLineDash([]);

  const ang = Math.atan2(lv.pad.y - aimY, lv.pad.x - aimX);
  const nTicks = 1 + Math.floor(pow * 7);
  for (let i = 1; i <= nTicks; i++){
    const d = i * 14;
    const x = lv.pad.x - Math.cos(ang) * d, y = lv.pad.y - Math.sin(ang) * d;
    cx.strokeStyle = "rgba(237,237,244," + (0.5 - i * 0.05) + ")";
    cx.beginPath();
    cx.moveTo(x + Math.cos(ang + Math.PI/2) * 5, y + Math.sin(ang + Math.PI/2) * 5);
    cx.lineTo(x + Math.cos(ang - Math.PI/2) * 5, y + Math.sin(ang - Math.PI/2) * 5);
    cx.stroke();
  }

  const { pts, end } = previewPath();
  cx.fillStyle = "rgba(237,237,244,0.55)";
  for (let i = 0; i < pts.length; i += 3){
    cx.globalAlpha = 0.55 * (1 - i / pts.length);
    cx.beginPath(); cx.arc(pts[i].x, pts[i].y, 2, 0, 7); cx.fill();
  }
  cx.globalAlpha = 1;
  if (end === "crash" && pts.length){
    const q = pts[pts.length - 1];
    cx.strokeStyle = "rgba(240,178,74,0.8)"; cx.lineWidth = 1.6;
    cx.beginPath();
    cx.moveTo(q.x - 5, q.y - 5); cx.lineTo(q.x + 5, q.y + 5);
    cx.moveTo(q.x + 5, q.y - 5); cx.lineTo(q.x - 5, q.y + 5);
    cx.stroke();
  }
}

/* ---------- main loop ---------- */
function frame(t){
  const dt = Math.min((t - tPrev) / 1000 || 0, 1 / 30);
  tPrev = t; clock += dt;

  if (phase === "fly") stepFlight(dt);
  if (phase === "aim" || phase === "fly") levelClock += dt;   // moons run while you think
  stepParticles(dt);
  if (flash > 0) flash = Math.max(0, flash - dt * 2.5);
  if (padPulse > 0) padPulse = Math.max(0, padPulse - dt * 3);

  draw();
  requestAnimationFrame(frame);
}

toMenu();
requestAnimationFrame(frame);
</script>
</body>
</html>
